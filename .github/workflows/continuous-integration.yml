name: HTTP API

on: [push, pull_request]

jobs:
  release:
    runs-on: ubuntu-24.04

    env:
      APP_ENV: test
      ALLOWED_ORIGIN: "*"
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Install packages
        run: sudo apt-get install bash gzip tar wget

      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Copy test environment variables configuration file
        run: |
          cp $GITHUB_WORKSPACE/.env.test.dist $GITHUB_WORKSPACE/.env.test.local
          cat $GITHUB_WORKSPACE/.env.test.local

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2

      - name: Cache composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Add HTTP basic auth credentials
        env:
          AUTH_JSON: ${{ secrets.COMPOSER_AUTH_JSON }}
        run: echo $AUTH_JSON > $GITHUB_WORKSPACE/auth.json

      - name: Install dependencies
        run: composer install --prefer-dist

      - name: Remove auth.json file
        run: rm -f $GITHUB_WORKSPACE/auth.json

      - name: Clear cache
        run: php bin/console cache:clear

      - name: Run tests
        timeout-minutes: 5
        run: make test
