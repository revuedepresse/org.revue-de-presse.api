name: HTTP API

on: [push, pull_request]

jobs:
  release:
    runs-on: ubuntu-24.04

    env:
      APP_ENV: test
      ALLOWED_ORIGIN: "*"
      RATE_LIMIT_ENABLED: "false"

    steps:
      - name: Install packages
        run: sudo apt-get install bash gzip tar wget

      - name: Checkout project
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Copy test environment variables configuration file
        run: |
          cp $GITHUB_WORKSPACE/.env.test.dist $GITHUB_WORKSPACE/.env.test.local
          cat $GITHUB_WORKSPACE/.env.test.local

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer:v2

      - name: Cache composer packages
        id: composer-cache
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Add HTTP basic auth credentials
        env:
          AUTH_JSON: ${{ secrets.COMPOSER_AUTH_JSON }}
        run: echo $AUTH_JSON > $GITHUB_WORKSPACE/auth.json

      - name: Install dependencies
        run: composer install --prefer-dist

      - name: Remove auth.json file
        run: rm -f $GITHUB_WORKSPACE/auth.json

      - name: Clear cache
        run: php bin/console cache:clear

      - name: Run tests
        timeout-minutes: 5
        run: make test

      - name: Warm test container (debug) for PHPStan
        env:
          APP_DEBUG: '1'
        run: php bin/console cache:warmup --env=test

      - name: PHPStan static analysis
        timeout-minutes: 5
        run: php bin/phpstan analyse --no-progress --error-format=github

      # Mirror the prod deploy's autoloader (provisioning/containers/_scripts/requirements.sh
      # runs `composer install --no-dev --classmap-authoritative`). Without
      # this, CI uses PSR-4 fallback and never sees classes that exist in
      # src/ but are missing from the optimised classmap — exactly the
      # failure mode that surfaces as ClassNotFoundError at first request
      # post-deploy.
      - name: Regenerate autoload as in prod (classmap-authoritative)
        run: composer dump-autoload --classmap-authoritative --no-dev

      # Compile the prod container so missing-classmap-entry bugs blow up
      # in CI instead of in production. CI previously only warmed the
      # `test` env, which never exercised the prod service wiring.
      #
      # NEWSLETTER_ENCRYPTION_KEY is required: BootEncryptedStringType is a
      # console.command listener (config/services.yaml), so booting bin/console
      # under --env=prod instantiates StaticEncryptionKey, which fails fast on
      # an empty/invalid key. The value below is the same base64-of-32-zero-bytes
      # placeholder used in .env.test.dist — CI never encrypts real data, this
      # only satisfies the boot-time validation.
      - name: Warm prod container
        env:
          NEWSLETTER_ENCRYPTION_KEY: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA='
        run: php bin/console cache:clear --env=prod --no-debug && php bin/console cache:warmup --env=prod --no-debug
