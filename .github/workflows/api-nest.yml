name: api-nest

on:
  push:
    branches: [main, http-api, http-api_nest-js]
    paths:
      - 'nestjs/**'
      - 'src/Bluesky/Resources/**'
      - '.github/workflows/api-nest.yml'
  pull_request:
    paths:
      - 'nestjs/**'
      - 'src/Bluesky/Resources/**'
      - '.github/workflows/api-nest.yml'

jobs:
  lint-typecheck-unit:
    runs-on: ubuntu-24.04
    defaults: { run: { working-directory: nestjs } }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'npm', cache-dependency-path: nestjs/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:component

  e2e:
    runs-on: ubuntu-24.04
    defaults: { run: { working-directory: nestjs } }
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: 'sqlite:///:memory:'
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      ALLOWED_ORIGIN: '.*'
      RATE_LIMIT_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'npm', cache-dependency-path: nestjs/package-lock.json }
      - run: npm ci
      - run: npm run test:e2e

  schema-parity:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports: ['5432:5432']
        options: --health-cmd "pg_isready -U app" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://app:app@127.0.0.1:5432/app?serverVersion=16&charset=utf8
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, bcmath
      - run: composer install --prefer-dist --no-progress
      - run: php bin/console doctrine:schema:create
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'npm', cache-dependency-path: nestjs/package-lock.json }
      - run: cd nestjs && npm ci
      - run: cd nestjs && npm run db:introspect:check
