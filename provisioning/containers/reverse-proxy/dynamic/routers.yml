# Traefik dynamic configuration — HTTP routers + services.
#
# Loaded by traefik's `file` provider (see docker-compose.yaml command flags).
# Pairs with certs.yml (the default TLS store).
#
# We use the file provider instead of the docker provider so Traefik
# does not need access to the docker socket — sidesteps the recurring
# Traefik-v3 ↔ Docker-Engine-29.x API-version handshake bug where
# Traefik requests /v1.24/version and Docker (MinAPIVersion=1.40)
# rejects it with 400.
#
# To target a different host, edit `Host(`…`)` below or add an extra
# router that points at the same `php-worker` service.

http:
    routers:
        php-worker-http:
            entrypoints:
                - web
            rule: "Host(`local.api.revue-de-presse.org`)"
            service: php-worker
        php-worker-https:
            entrypoints:
                - websecure
            rule: "Host(`local.api.revue-de-presse.org`)"
            service: php-worker
            tls: {}

        # Dashboard at http://traefik.localhost/dashboard/ — guarded by
        # basic-auth whose user list lives in a gitignored htpasswd file.
        # Generate / refresh credentials with `make reverse-proxy-password`.
        dashboard:
            entrypoints:
                - web
            rule: "Host(`traefik.localhost`)"
            service: api@internal
            middlewares:
                - dashboard-auth

    services:
        php-worker:
            loadBalancer:
                servers:
                    # Docker DNS resolves `php-worker` to the
                    # sibling service's IP within the compose network.
                    - url: "http://php-worker:80"
                passHostHeader: true

    middlewares:
        dashboard-auth:
            basicAuth:
                # File is mounted from host var/etc/letsencrypt/htpasswd.
                # Empty file → every request gets 401 (deny-by-default
                # when the operator hasn't generated credentials yet).
                usersFile: /etc/letsencrypt/htpasswd
                realm: "Traefik dashboard"
