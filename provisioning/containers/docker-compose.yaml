services:

    app:
        build:
            context: .
            dockerfile: './app/Dockerfile'
        env_file:
            - '../../.env.local'
        restart: always
        volumes:
            - './service/templates/extensions.ini.dist:/usr/local/etc/php/conf.d/extensions.ini'
            - './service/templates/:/templates/'
            - '../../../shared/:/var/www/shared/'

    cache:
        image: redis:7-bookworm
        command: redis-server --appendonly yes
        restart: always
        volumes:
            - '../volumes/cache:/data'

    service:
        build:
            context: .
            dockerfile: './service/Dockerfile'
        depends_on:
            - cache
        env_file:
            - '../../.env.local'
        # host-native llama-server reachability for chat (LLAMA_*_BASE_URL).
        # No-op on Docker Desktop (host.docker.internal resolves natively);
        # required on Linux/Docker Engine where the alias is opt-in.
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        restart: always
        volumes:
            - './service/templates/extensions.ini.dist:/usr/local/etc/php/conf.d/extensions.ini'
            - './service/templates/docker.conf:/usr/local/etc/php-fpm.d/docker.conf'
            - './service/templates/empty.conf:/usr/local/etc/php-fpm.d/zz-docker.conf'
            - '../../../shared/:/var/www/shared/'
            - type: bind
              source: './service/templates/www.conf'
              target: '/usr/local/etc/php-fpm.d/www.conf'
              bind:
                  create_host_path: false

    # NestJS API service — lightweight Node.js HTTP API ported from the
    # Symfony/API-Platform stack. Gated behind the `nest` profile so it
    # does not start with bare `docker compose up` unless explicitly opted in.
    # Drive it through make targets or:
    #
    #   docker compose --profile nest up -d api-nest
    #
    api-nest:
        profiles:
            - nest
        build:
            context: ../..
            dockerfile: provisioning/containers/api-nest/Dockerfile
        image: revue-de-presse/api-nest:latest
        depends_on:
            - cache
        environment:
            APP_ENV: prod
            DATABASE_URL: '${DATABASE_URL:-}'
            REDIS_HOST: '${REDIS_HOST:-cache}'
            REDIS_PORT: '${REDIS_PORT:-6379}'
            ALLOWED_ORIGIN: '${CORS_ALLOW_ORIGIN:-}'
            RATE_LIMIT_ENABLED: 'true'
            TRUSTED_PROXIES: '${TRUSTED_PROXIES:-}'
            PORT: '3000'
        restart: 'unless-stopped'

    # Production-style PHP worker runtime (FrankenPHP under the hood —
    # the directory `./php-worker/` hosts the Dockerfile + Caddyfile
    # + php.ini.dist, but the compose service is named after its role).
    # Gated behind the `frankenphp` profile so neither `docker compose up`
    # nor `docker compose build` touch it without an explicit opt-in.
    # Drive it through the make targets, not the bare docker CLI:
    #
    #   make php-worker-build    # build the php-worker image
    #   make php-worker-start    # start the container, detached
    #   make php-worker-stop     # stop the container
    #   make php-worker-logs     # tail logs
    #
    # The `reverse-proxy-*` family of targets does the same for the
    # sibling edge proxy. Bring up the full stack with:
    #
    #   make php-worker-build reverse-proxy-build
    #   make reverse-proxy-start    # depends_on pulls php-worker + cache in
    #
    # Replaces (nginx + php-fpm) with a single Caddy-embedded PHP worker.
    # Reachable only through the sibling `reverse-proxy` service — no
    # host ports are published directly. Compose's default network gives
    # reverse-proxy service-name discovery, so it forwards to
    # `php-worker:80`.
    php-worker:
        profiles:
            - frankenphp
        build:
            context: .
            dockerfile: './php-worker/Dockerfile'
            args:
                OWNER_UID: '${PROJECT_OWNER_UID:-1000}'
                OWNER_GID: '${PROJECT_OWNER_GID:-1001}'
                PROJECT:   '${PROJECT:-org.example.api}'
        depends_on:
            - cache
        env_file:
            - '../../.env.local'
        environment:
            # Production-shaped defaults. Override via .env.local only if you
            # specifically want a dev-style FrankenPHP run.
            APP_ENV:                 'prod'
            APP_DEBUG:               '0'
            # Listen on both :80 (for reverse-proxy internal HTTP) and :443
            # (for direct TLS access if a host port mapping is added back).
            SERVER_NAME:             ':80 :443'
            # Manual worker mode — public/worker.php contains the
            # `frankenphp_handle_request()` request loop. Not using
            # symfony/runtime/runtime-frankenphp-symfony so the FPM
            # container's public/index.php stays untouched (it's still
            # the classic pre-Runtime-component shape).
            FRANKENPHP_CONFIG:       'worker /var/www/${PROJECT:-org.example.api}/public/worker.php'
            FRANKENPHP_NUM_THREADS:  '${FRANKENPHP_NUM_THREADS:-8}'
            PROJECT_DIR:             '/var/www/${PROJECT:-org.example.api}'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        restart: 'unless-stopped'
        security_opt:
            - 'no-new-privileges:true'
        mem_limit: '4g'
        cpus: 4.0
        tmpfs:
            - /tmp:size=128M
        ulimits:
            nofile:
                soft: 65536
                hard: 65536
        # No host ports — only reachable through the sibling reverse-proxy
        # service. Routing is declared in
        # provisioning/containers/reverse-proxy/dynamic/routers.yml (file provider);
        # docker-label-based discovery is intentionally NOT used to avoid
        # Traefik needing access to the docker socket.
        volumes:
            - '../../../shared/:/var/www/shared/'
            - './php-worker/Caddyfile:/etc/caddy/Caddyfile:ro'
            # PHP runtime configuration overlay — see
            # provisioning/containers/php-worker/templates/php.ini.dist.
            # Loaded after the base image defaults; the `zz-` prefix wins.
            - './php-worker/templates/php.ini.dist:/usr/local/etc/php/conf.d/zz-frankenphp-prod.ini:ro'
        healthcheck:
            test: ['CMD', 'curl', '-fkSs', 'http://localhost/api/healthcheck']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 30s

    # Chat-stack inference is host-native (llama-server on the Mac with
    # Metal). No sibling container — PHP reaches the two llama-servers
    # via host.docker.internal:8081 (chat) and :8082 (embeddings). See
    # provisioning/llama/README.md.

    # Edge reverse-proxy (Traefik) for the frankenphp profile. Same profile
    # gate. Bring it up with `make reverse-proxy-start` (which pulls
    # php-worker in via depends_on); stop with `make reverse-proxy-stop`.
    #
    # Routing is declared in the file provider
    # (provisioning/containers/reverse-proxy/dynamic/routers.yml). We deliberately
    # don't use the docker provider: Traefik v3.5's bundled docker client
    # pins API v1.24, which Docker Engine 29.x (MinAPIVersion=1.40)
    # rejects with HTTP 400, breaking discovery on every restart.
    #
    # NOTE: takes host ports 80 and 443, so the legacy nginx-based
    # local.proxy stack must not be running at the same time.
    reverse-proxy:
        profiles:
            - frankenphp
        image: 'traefik:v3.5'
        restart: 'unless-stopped'
        depends_on:
            - php-worker
        command:
            # Dashboard enabled but NOT served on a separate insecure entrypoint —
            # add a router for it in routers.yml when needed, then guard it
            # with a basic-auth middleware whose users live in routers.yml.
            - '--api.dashboard=true'
            - '--api.insecure=false'
            - '--ping=true'
            # File provider only — declarative routers + TLS cert store,
            # live-reloaded on save.
            - '--providers.file.directory=/etc/traefik/dynamic'
            - '--providers.file.watch=true'
            - '--entrypoints.web.address=:80'
            - '--entrypoints.websecure.address=:443'
            - '--log.level=INFO'
            - '--accesslog=true'
        env_file:
            - '../../.env.local'
        security_opt:
            - 'no-new-privileges:true'
        mem_limit: '256m'
        cpus: 1.0
        ports:
            - '${TRAEFIK_HTTP_PORT:-80}:80/tcp'
            - '${TRAEFIK_HTTPS_PORT:-443}:443/tcp'
        volumes:
            # Dynamic config — declares the TLS cert store and any future
            # static routes/middlewares. Read-only mount; watch=true picks
            # up edits live.
            - './reverse-proxy/dynamic:/etc/traefik/dynamic:ro'
            # Local TLS material. Drop your fullchain.pem and privkey.pem
            # into var/etc/letsencrypt/live/default/ on the host (gitignored)
            # and they're picked up by traefik via the file provider.
            - '../../var/etc/letsencrypt:/etc/letsencrypt:ro'
        # Dashboard router moved to routers.yml when needed — docker labels
        # would require the docker provider, which we're not running.
        healthcheck:
            test: ['CMD', 'traefik', 'healthcheck', '--ping']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
