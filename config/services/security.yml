services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\Security\Domain\AccessTokenStore:
        class: App\Security\Infrastructure\Redis\RedisAccessTokenStore
        arguments:
            $redis: '@App\Infrastructure\Cache\RedisCache'

    App\Security\Domain\AccessTokenMinter:
        arguments:
            $ttlSeconds: 900

    App\Security\Infrastructure\Symfony\BasicClientCredentialsExtractor: ~

    App\Security\Infrastructure\Symfony\ApiAccessTokenHandler:
        arguments:
            $memberRepository: '@App\Membership\Infrastructure\Repository\MemberRepository'

    App\Security\Infrastructure\ApiPlatform\State\TokenProcessor: ~

    App\Security\Domain\DeviceTokenMinter:
        arguments:
            $store:          '@App\Security\Domain\AccessTokenStore'
            $deviceMemberId: '%env(string:DEVICE_MEMBER_ID)%'
            $ttlSeconds:     900

    App\Security\Infrastructure\ApiPlatform\State\DeviceTokenProcessor:
        arguments:
            $minter: '@App\Security\Domain\DeviceTokenMinter'

    # NewsReview wiring (Highlight resource)
    App\NewsReview\Domain\Snapshot\SnapshotReader:
        class: App\NewsReview\Infrastructure\Repository\FilesystemSnapshotReader
        arguments:
            $projectDir: '%kernel.project_dir%'
            $logger: '@logger'

    App\NewsReview\Domain\Snapshot\Filter\HighlightFilters: ~
    App\NewsReview\Domain\Snapshot\Filter\HighlightNormalizer: ~

    App\NewsReview\Infrastructure\ApiPlatform\State\HighlightCollectionProvider:
        arguments:
            $reader:       '@App\NewsReview\Domain\Snapshot\SnapshotReader'
            $filters:      '@App\NewsReview\Domain\Snapshot\Filter\HighlightFilters'
            $normalizer:   '@App\NewsReview\Domain\Snapshot\Filter\HighlightNormalizer'
            $redis:        '@App\Infrastructure\Cache\RedisCache'
            $requestStack: '@request_stack'
            $logger:       '@logger'
            $apiEnv:       '%kernel.environment%'
        tags:
            - { name: 'api_platform.state_provider' }

    App\NewsReview\Infrastructure\ApiPlatform\Listener\HighlightsCacheHeaderListener:
        tags:
            - { name: kernel.event_subscriber }

    App\Security\Infrastructure\Http\RateLimitSubscriber:
        arguments:
            $tokenMintLimiterFactory:        '@limiter.token_mint'
            $deviceTokenMintLimiterFactory:  '@limiter.device_token_mint'
            $highlightsLimiterFactory:       '@limiter.highlights'
            $docsLimiterFactory:             '@limiter.docs'
            $logger: '@logger'
            $enabled: '%env(bool:RATE_LIMIT_ENABLED)%'
        tags:
            - { name: kernel.event_subscriber }
