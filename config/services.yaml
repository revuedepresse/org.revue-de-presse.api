imports:
    - { resource: services/repository.yml }
    - { resource: services/security.yml }

services:
    _defaults:
        autowire:       true
        autoconfigure:  true

    app.cache.redis:
        class: '%redis_cache.class%'
        arguments:
            - "%redis_host%"
            - "%redis_port%"

    App\Infrastructure\Cache\RedisCache: '@app.cache.redis'

    App\TikTok\Infrastructure\Http\HttpTikTokOAuthClient:
        arguments:
            $httpClient:   '@Symfony\Contracts\HttpClient\HttpClientInterface'
            $clientKey:    '%env(string:TIKTOK_CLIENT_KEY)%'
            $clientSecret: '%env(string:TIKTOK_CLIENT_SECRET)%'

    App\TikTok\Infrastructure\Http\TikTokOAuthClient: '@App\TikTok\Infrastructure\Http\HttpTikTokOAuthClient'

    App\TikTok\Infrastructure\Http\HmacTikTokWebhookVerifier:
        arguments:
            $clientSecret: '%env(string:TIKTOK_CLIENT_SECRET)%'

    App\TikTok\Infrastructure\Http\TikTokWebhookVerifier: '@App\TikTok\Infrastructure\Http\HmacTikTokWebhookVerifier'

    App\TikTok\Infrastructure\Controller\TikTokOAuthCallbackController:
        tags: ['controller.service_arguments']

    App\TikTok\Infrastructure\Controller\TikTokOAuthExchangeController:
        arguments:
            $client: '@App\TikTok\Infrastructure\Http\TikTokOAuthClient'
        tags: ['controller.service_arguments']

    App\TikTok\Infrastructure\Controller\TikTokWebhookController:
        arguments:
            $verifier: '@App\TikTok\Infrastructure\Http\TikTokWebhookVerifier'
        tags: ['controller.service_arguments']

    App\Newsletter\Infrastructure\Crypto\StaticEncryptionKey:
        arguments:
            $base64PrimaryKey: '%env(NEWSLETTER_ENCRYPTION_KEY)%'
            $base64NextKey: '%env(default::NEWSLETTER_ENCRYPTION_KEY_NEXT)%'

    App\Newsletter\Infrastructure\Doctrine\BootEncryptedStringType:
        arguments: ['@App\Newsletter\Infrastructure\Crypto\StaticEncryptionKey']
        tags:
            - { name: 'kernel.event_listener', event: 'kernel.request', priority: 1024 }
            - { name: 'kernel.event_listener', event: 'console.command', priority: 1024 }

    App\Newsletter\Domain\Repository\SubscriberRepository:
        alias: App\Newsletter\Infrastructure\Repository\DoctrineSubscriberRepository

    App\Newsletter\Domain\Service\TokenGenerator:
        alias: App\Newsletter\Infrastructure\Service\RandomTokenGenerator

    App\Newsletter\Domain\Service\DailyReportRenderer: ~

    App\Newsletter\Infrastructure\Config\NewsletterConfig:
        arguments:
            $timezone:          '%env(NEWSLETTER_DAILY_TZ)%'
            $confirmTtlHours:   '%env(int:NEWSLETTER_CONFIRM_TTL_HOURS)%'
            $fromEmail:         '%env(NEWSLETTER_FROM_EMAIL)%'
            $fromName:          '%env(NEWSLETTER_FROM_NAME)%'
            $baseUrl:           '%env(NEWSLETTER_BASE_URL)%'
            $designTokensPath:  '%env(NEWSLETTER_DESIGN_TOKENS_PATH)%'
            $encryptionKey:     '%env(NEWSLETTER_ENCRYPTION_KEY)%'
            $encryptionKeyNext: '%env(default::NEWSLETTER_ENCRYPTION_KEY_NEXT)%'

parameters:
    monolog_channels:               ['benchmark']

    redis_cache.class:              'App\Infrastructure\Cache\RedisCache'

    allowed.origin:                 '%env(resolve:ALLOWED_ORIGIN)%'

    redis_host:                     '%env(resolve:REDIS_HOST)%'
    redis_port:                     '%env(resolve:REDIS_PORT)%'
