imports:
    - { resource: services/repository.yml }
    - { resource: services/security.yml }

services:
    _defaults:
        autowire:       true
        autoconfigure:  true

    app.cache.redis:
        class: '%redis_cache.class%'
        arguments:
            - "%redis_host%"
            - "%redis_port%"

    App\Infrastructure\Cache\RedisCache: '@app.cache.redis'

    App\TikTok\Infrastructure\Http\HttpTikTokOAuthClient:
        arguments:
            $httpClient:   '@Symfony\Contracts\HttpClient\HttpClientInterface'
            $clientKey:    '%env(string:TIKTOK_CLIENT_KEY)%'
            $clientSecret: '%env(string:TIKTOK_CLIENT_SECRET)%'

    App\TikTok\Infrastructure\Http\TikTokOAuthClient: '@App\TikTok\Infrastructure\Http\HttpTikTokOAuthClient'

    App\TikTok\Infrastructure\Controller\TikTokOAuthCallbackController:
        tags: ['controller.service_arguments']

    App\TikTok\Infrastructure\Controller\TikTokOAuthExchangeController:
        arguments:
            $client: '@App\TikTok\Infrastructure\Http\TikTokOAuthClient'
        tags: ['controller.service_arguments']

parameters:
    monolog_channels:               ['benchmark']

    redis_cache.class:              'App\Infrastructure\Cache\RedisCache'

    allowed.origin:                 '%env(resolve:ALLOWED_ORIGIN)%'

    redis_host:                     '%env(resolve:REDIS_HOST)%'
    redis_port:                     '%env(resolve:REDIS_PORT)%'
