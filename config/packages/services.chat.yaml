# Chat module — wiring that depends on symfony/ai-bundle + lcobucci/jwt.
#
# The service ids below (`@ai.indexer.chat_publications`,
# `@ai.retriever.chat_publications`, `@ai.platform.failover.chat_default`)
# are best-guess based on the public symfony/ai-bundle docs. Verify with
# `bin/console debug:container ai.` after composer install; update if the
# bundle exposes different ids.

services:
    # YAML _defaults only apply to services declared in the same file.
    # Without this block, explicitly-declared services here (e.g.
    # RunChatTurnProcessor below, which has tags: but no arguments:)
    # are built with zero ctor args and crash at first use:
    #   "Too few arguments to function App\Chat\…\RunChatTurnProcessor::__construct()"
    _defaults:
        autowire:      true
        autoconfigure: true

    App\Chat\Application\Port\PublicationEmbedder:
        alias: App\Chat\Infrastructure\Symfony\Ai\SymfonyAiPublicationEmbedder

    App\Chat\Application\Port\EmbeddedPublicationsRegistry:
        alias: App\Chat\Infrastructure\Doctrine\DoctrineEmbeddedPublicationsRegistry
    App\Chat\Infrastructure\Doctrine\DoctrineEmbeddedPublicationsRegistry:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    # Explicit catalog wired into ai.platform.generic.ollama so embedding
    # models without "embed" in their name (e.g. bge-m3) are correctly
    # classified as EmbeddingsModel, not CompletionsModel.
    App\Chat\Infrastructure\Symfony\Ai\OllamaModelCatalog: ~

    App\Chat\Infrastructure\Symfony\Ai\SymfonyAiPublicationEmbedder:
        arguments:
            $indexer: '@ai.indexer.chat_publications'

    App\Chat\Application\Port\PublicationRetriever:
        alias: App\Chat\Infrastructure\Symfony\Ai\SymfonyAiPublicationRetriever
    App\Chat\Infrastructure\Symfony\Ai\SymfonyAiPublicationRetriever:
        arguments:
            # Store + vectorizer injected directly so we craft a VectorQuery
            # ourselves — see the class doc-block for why we bypass
            # `ai.retriever.chat_publications` (HybridQuery auto-pick = 0 rows).
            $store: '@ai.store.postgres.chat_publications'
            $vectorizer: '@ai.vectorizer.chat_publications'

    App\Chat\Application\Port\ChatStreamer:
        alias: App\Chat\Infrastructure\Symfony\Ai\SymfonyAiChatStreamer
    App\Chat\Infrastructure\Symfony\Ai\SymfonyAiChatStreamer:
        arguments:
            # Self-hosted via Ollama. Default `gemma2:2b` (~1.6 GB) fits
            # a default Docker Desktop VM alongside the bge-m3 embedding
            # model. Swap to `gemma2:9b` (~5.4 GB) for higher answer
            # quality — but FIRST bump Docker Desktop's VM memory to
            # 12 GB+ and the ollama service's mem_limit accordingly,
            # otherwise the llama runner OOM-kills and Ollama returns
            # 500. Both sizes are registered in OllamaModelCatalog.
            $platform: '@ai.platform.generic.ollama'
            $model: 'gemma2:2b'

    App\Chat\Application\RunChatTurn:
        arguments:
            $chatPerUserLimiter:     '@limiter.chat_per_user'
            $chatGlobalQuotaLimiter: '@limiter.chat_global_quota'

    App\Chat\Infrastructure\ApiPlatform\State\RunChatTurnProcessor:
        tags: ['api_platform.state_processor']

    App\Chat\Infrastructure\Security\BlueskyJwtAuthenticator:
        arguments:
            $sharedSecret: '%env(string:API_JWT_SECRET)%'

    App\Chat\Infrastructure\Console\EmbedSnapshotsCommand:
        arguments:
            $snapshotReader: '@App\NewsReview\Domain\Snapshot\SnapshotReader'
