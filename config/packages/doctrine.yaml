doctrine:
    dbal:
        types:
            newsletter_encrypted_string: App\Newsletter\Infrastructure\Doctrine\Type\EncryptedStringType
        connections:
            default:
                url: '%env(resolve:DATABASE_URL)%'
                server_version: '14'
                charset: UTF8
                logging: false

    orm:
        default_entity_manager:         default
        enable_native_lazy_objects:     true
        entity_managers:
            default:
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                auto_mapping: false
                connection: default
                mappings:
                    Membership:
                        alias:      'Membership'
                        dir:        '%kernel.project_dir%/src/Membership/Domain/Entity'
                        is_bundle:  false
                        prefix:     'App\Membership\Domain\Entity'
                        type:       attribute
                    Newsletter:
                        alias:      'Newsletter'
                        dir:        '%kernel.project_dir%/src/Newsletter/Domain/Entity'
                        is_bundle:  false
                        prefix:     'App\Newsletter\Domain\Entity'
                        type:       attribute
