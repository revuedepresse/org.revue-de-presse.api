monolog:
    handlers:
        main:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            channels: ["!event", "!benchmark"]
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!console"]
        deprecation:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.deprecations.log"
        benchmark:
            type: stream
            path: "%kernel.logs_dir%/benchmark.log"
            level: debug
            channels: ["benchmark"]
        newsletter:
            type: stream
            path: "%kernel.logs_dir%/newsletter.log"
            level: debug
            channels: ["newsletter"]

    channels: "%monolog_channels%"
