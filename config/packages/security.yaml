security:
    # https://symfony.com/doc/current/security.html#where-do-users-come-from-user-providers
    providers:

        in_memory: { memory: null }

        member_entity_provider:
            entity:
                class:          App\Membership\Domain\Entity\Legacy\Member
                property:       apiKey
                manager_name:   default

        user_provider:
            id: App\Twitter\Infrastructure\Security\Authentication\CachedApiKeyUserProvider

        chain_provider:
            chain:
                providers: [user_provider]

    firewalls:
        main:
            provider: user_provider
            stateless: true
            custom_authenticators:
                - app.token_authenticator
            entry_point: app.token_authenticator

when@prod:
    security:
        access_control:
            - { path: ^/api/callback,    role: PUBLIC_ACCESS }
            - { path: ^/api/healthcheck, role: PUBLIC_ACCESS }
            - { path: ^/api,             role: ROLE_USER }

when@dev:
    security:
        access_control:
            - { path: ^/api/callback,    role: PUBLIC_ACCESS }
            - { path: ^/api/healthcheck, role: PUBLIC_ACCESS }
            - { path: ^/api,             role: ROLE_USER }

when@test:
    security:
        access_control:
            - { path: ^/api/callback,    role: PUBLIC_ACCESS }
            - { path: ^/api/healthcheck, role: PUBLIC_ACCESS }
            - { path: ^/api,             role: ROLE_USER }

