monolog:
    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_http_codes: [404, 405]
            channels: ["!event", "!benchmark"]
        nested:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
        benchmark:
            type: stream
            path: "%kernel.logs_dir%/benchmark.log"
            level: debug
            channels: ["benchmark"]
        newsletter:
            type: stream
            path: "%kernel.logs_dir%/newsletter.log"
            level: debug
            channels: ["newsletter"]
    channels: "%monolog_channels%"
