framework:
    rate_limiter:
        token_mint:
            policy: 'token_bucket'
            limit: 3
            rate: { interval: '6 seconds', amount: 1 }
            cache_pool: cache.rate_limiter
        device_token_mint:
            # Device clients (Compose Multiplatform desktop/Android/iOS) hit this
            # with no shared secret. Generous burst tolerates initial mint + a
            # refresh per hour or so; steady refill stays well below abuse.
            policy: 'token_bucket'
            limit: 6
            rate: { interval: '1 minute', amount: 1 }
            cache_pool: cache.rate_limiter
        highlights:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
            cache_pool: cache.rate_limiter
        docs:
            policy: 'sliding_window'
            limit: 30
            interval: '1 minute'
            cache_pool: cache.rate_limiter
        newsletter_public:
            policy: 'token_bucket'
            limit: 30
            rate: { interval: '1 minute', amount: 30 }
            cache_pool: cache.rate_limiter
        newsletter_unsubscribe_post:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
            cache_pool: cache.rate_limiter
