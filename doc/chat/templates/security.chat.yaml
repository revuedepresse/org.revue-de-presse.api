# Chat firewall — copied into config/packages/ after composer install.
#
# After running:
#   composer require firebase/php-jwt symfony/ai-bundle ...
# copy this file into config/packages/security.chat.yaml. The framework
# merges every *.yaml under config/packages/ into the active config.
# Kept under doc/chat/templates/ pre-install so the loaded-config dir
# stays clean of pending files. See doc/chat/post-install.md.

security:
    firewalls:
        chat:
            pattern: ^/api/chat
            stateless: true
            custom_authenticators:
                - App\Chat\Infrastructure\Security\BlueskyJwtAuthenticator

when@prod:
    security:
        access_control:
            - { path: ^/api/chat, role: ROLE_BSKY_USER }

when@dev:
    security:
        access_control:
            - { path: ^/api/chat, role: ROLE_BSKY_USER }

when@test:
    security:
        access_control:
            - { path: ^/api/chat, role: ROLE_BSKY_USER }
